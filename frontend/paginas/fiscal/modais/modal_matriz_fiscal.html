<div id="modal-matriz-fiscal" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center z-[1000] p-4 font-sans">
    <div class="bg-white w-full max-w-[850px] rounded-md shadow-2xl overflow-hidden border border-slate-400 animate-in fade-in zoom-in duration-200 h-fit max-h-[95vh] flex flex-col">
        
        <!-- Header do Modal (Pattern SIG V3 UIKit) -->
        <div class="bg-slate-50 p-2 px-4 flex justify-between items-center border-b border-slate-300 shrink-0">
            <div class="flex items-center gap-2">
                <span class="material-symbols-outlined text-slate-500 !text-sm">gavel</span>
                <h3 id="modal-titulo" class="text-slate-700 font-bold text-[11px] uppercase tracking-wider italic">Configuração de Regra da Matriz Fiscal</h3>
            </div>
            <button onclick="fecharModalMatriz()" class="sig-btn-close !w-7 !h-7">
                <span class="material-symbols-outlined !text-base">close</span>
            </button>
        </div>

        <!-- Conteúdo do Modal (Alta Densidade) -->
        <div class="p-6 overflow-y-auto bg-white flex-1 custom-scrollbar">
            <form id="form-matriz" class="space-y-6">
                <!-- IDENTIFICAÇÃO E ATIVO -->
                <div class="grid grid-cols-12 gap-x-4 gap-y-4 bg-slate-50/50 p-4 rounded border border-slate-200">
                    <div class="col-span-12 md:col-span-8">
                        <label class="sig-label-dense">NOME DESCRITIVO DA REGRA</label>
                        <input type="text" id="mat-nome" class="sig-input-dense w-full font-bold uppercase" placeholder="EX: VENDA INTERNA SIMPLES" title="Nome para identificação rápida desta regra na listagem da matriz.">
                    </div>
                    <div class="col-span-6 md:col-span-2">
                        <label class="sig-label-dense">PRIORIDADE</label>
                        <select id="mat-prioridade" class="sig-input-dense w-full font-black text-indigo-600" title="Define a ordem de importância. Regras de maior prioridade (ex: Devolução) sobrepõem as de menor (ex: Venda).">
                            <option value="PADRÃO">PADRÃO</option>
                            <option value="ALTA">ALTA</option>
                            <option value="CRÍTICA">CRÍTICA (EXCEÇÃO)</option>
                        </select>
                    </div>
                    <div class="col-span-6 md:col-span-2 flex items-center gap-2 pt-4">
                        <label class="sig-check-group cursor-pointer" title="Habilita ou desabilita esta regra globalmente no motor fiscal.">
                            <input type="checkbox" id="mat-ativa" class="sig-checkboxScale" checked>
                            <span class="sig-check-label font-bold text-[10px]">ATIVO</span>
                        </label>
                    </div>
                </div>

                <div class="grid grid-cols-12 gap-6">
                    <!-- COLUNA 01: CONDIÇÕES (FILTROS) -->
                    <div class="col-span-12 md:col-span-7 space-y-4">
                        <div class="sig-fieldset-blueprint">
                            <span class="sig-legend-blueprint text-blue-700 bg-blue-50">01. CONDIÇÕES DA OPERAÇÃO</span>
                            <div class="grid grid-cols-12 gap-3">
                                <div class="col-span-6">
                                    <label class="sig-label-dense">REGIME TRIBUTÁRIO</label>
                                    <select id="mat-regime" class="sig-input-dense w-full" title="Filtra a aplicação desta regra baseada no regime tributário da empresa logada.">
                                        <option value="">TODOS</option>
                                        <option value="SIMPLES">SIMPLES NACIONAL</option>
                                        <option value="PRESUMIDO">LUCRO PRESUMIDO</option>
                                        <option value="REAL">LUCRO REAL</option>
                                    </select>
                                </div>
                                <div class="col-span-6">
                                    <label class="sig-label-dense">OPERAÇÃO (SENTIDO)</label>
                                    <select id="mat-operacao" class="sig-input-dense w-full font-bold" title="Define se a regra se aplica a Notas de Saída (Faturamento) ou Entrada (Compras).">
                                        <option value="">AMBOS</option>
                                        <option value="ENTRADA">ENTRADA (1/2)</option>
                                        <option value="SAIDA">SAÍDA (5/6)</option>
                                    </select>
                                </div>
                                <div class="col-span-6">
                                    <label class="sig-label-dense">DESTINO UF</label>
                                    <select id="mat-tipo-destino" class="sig-input-dense w-full font-bold text-blue-700 text-[10px]" title="Determina se a regra é para operações dentro do estado ou para fora do estado.">
                                        <option value="TODAS">TODAS LOCALIDADES</option>
                                        <option value="INTERNA">INTERNA (MESMA UF)</option>
                                        <option value="INTERESTADUAL">INTERESTADUAL (OUTRAS UFS)</option>
                                    </select>
                                </div>
                                <div class="col-span-6">
                                    <label class="sig-label-dense">PRODUTO COM ST?</label>
                                    <select id="mat-incide-st-cond" class="sig-input-dense w-full" title="Filtra se o produto possui ou não incidência de ST no cadastro de itens.">
                                        <option value="">SIM OU NÃO</option>
                                        <option value="SIM">SIM (PRODUTO COM ST)</option>
                                        <option value="NAO">NÃO (PRODUTO SEM ST)</option>
                                    </select>
                                </div>
                                <div class="col-span-12">
                                    <label class="sig-label-dense">NCM (FILTRO POR PREFIXO OU COMPLETO)</label>
                                    <input type="text" id="mat-ncm" placeholder="EX: 8708 ou 8708.99.00" class="sig-input-dense w-full font-mono text-center tracking-widest uppercase" title="Filtra por código NCM. Você pode usar apenas o prefixo (Ex: 8708) para abranger todos os itens do grupo.">
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- COLUNA 02: RESULTADOS (AÇÕES) -->
                    <div class="col-span-12 md:col-span-5 space-y-4">
                        <div class="sig-fieldset-blueprint">
                            <span class="sig-legend-blueprint text-indigo-700 bg-indigo-50">02. RESULTADO TRIBUTÁRIO</span>
                            <div class="grid grid-cols-2 gap-3">
                                <div>
                                    <label class="sig-label-dense text-indigo-600 font-black">CFOP FINAL</label>
                                    <input type="text" id="mat-res-cfop" class="sig-input-dense w-full font-black text-base text-center bg-indigo-50/30 border-indigo-200" placeholder="5102" title="Código Fiscal de Operações e Prestações que será injetado na nota fiscal.">
                                </div>
                                <div>
                                    <label class="sig-label-dense text-indigo-600 font-black">CST / CSOSN</label>
                                    <input type="text" id="mat-res-cst" class="sig-input-dense w-full font-black text-base text-center bg-indigo-50/30 border-indigo-200" placeholder="102" title="Código de Situação Tributária que define o tratamento de impostos do item.">
                                </div>
                                
                                <!-- CHECKBOXES DE CÁLCULO (HUMANIZADOS) -->
                                <div class="col-span-2 bg-slate-50 p-3 rounded border border-slate-200 space-y-2 mt-2">
                                    <label class="sig-check-group cursor-pointer" title="Imprime os valores de ICMS nos campos de destaque da nota fiscal.">
                                        <input type="checkbox" id="mat-res-destaca-icms" class="sig-checkboxScale" checked>
                                        <span class="sig-check-label font-bold text-[9px] uppercase">Destacar ICMS na Nota</span>
                                    </label>
                                    <label class="sig-check-group cursor-pointer" title="Informa na nota que o destinatário pode creditar-se do ICMS desta operação.">
                                        <input type="checkbox" id="mat-res-gera-credito" class="sig-checkboxScale">
                                        <span class="sig-check-label font-bold text-[9px] uppercase">Lançar Crédito de ICMS</span>
                                    </label>
                                    <hr class="border-slate-200">
                                    <div class="grid grid-cols-2 gap-2">
                                        <label class="sig-check-group cursor-pointer" title="Ativa a incidência e o cálculo do Imposto sobre Produtos Industrializados.">
                                            <input type="checkbox" id="mat-res-incide-ipi" class="sig-checkboxScale">
                                            <span class="sig-check-label text-[9px] uppercase">Calcular IPI</span>
                                        </label>
                                        <label class="sig-check-group cursor-pointer" title="Ativa o Diferencial de Alíquota para operações interestaduais com consumidor final.">
                                            <input type="checkbox" id="mat-res-incide-difal" class="sig-checkboxScale">
                                            <span class="sig-check-label text-[9px] uppercase">Cobrar DIFAL Destino</span>
                                        </label>
                                        <label class="sig-check-group cursor-pointer" title="Ativa o cálculo do Programa de Integração Social.">
                                            <input type="checkbox" id="mat-res-incide-pis" class="sig-checkboxScale">
                                            <span class="sig-check-label text-[9px] uppercase">Incidir PIS</span>
                                        </label>
                                        <label class="sig-check-group cursor-pointer" title="Ativa o cálculo da Contribuição para Financiamento da Seguridade Social.">
                                            <input type="checkbox" id="mat-res-incide-cofins" class="sig-checkboxScale">
                                            <span class="sig-check-label text-[9px] uppercase">Incidir COFINS</span>
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </form>
        </div>

        <!-- Footer do Modal (UIKit Pattern) -->
        <div class="p-3 bg-slate-50 border-t border-slate-200 flex justify-end gap-2 px-6 shrink-0">
            <button onclick="fecharModalMatriz()" class="sig-btn text-slate-500 hover:bg-slate-200 uppercase text-[10px] font-bold">Cancelar</button>
            <button onclick="salvarRegraMatriz()" class="sig-btn sig-btn-primary min-w-[200px] uppercase text-[10px] font-black tracking-widest shadow-lg shadow-indigo-500/10">
                Efetivar Regra Fiscal (F10)
            </button>
        </div>
    </div>
</div>
