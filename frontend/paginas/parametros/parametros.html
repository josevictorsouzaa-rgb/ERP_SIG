<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>SIG - PARÂMETROS</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'sig-blue': '#1e40af',
                        'sig-blue-dark': '#1e3a8a',
                        'sig-brand-cyan': '#00e5ff',
                        'sig-brand-dark': '#001b2b',
                        'sig-border': '#cbd5e1',
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="../../assets/css/sig-ui.css">
    <script src="../../componentes/ui_global/sig-statusbar.js"></script>
    <script src="../../componentes/ui_global/modal_fornecedor.js"></script>
    <script src="../../assets/js/sig-toast.js"></script>
    <style>
        /* ESTILIZAÇÃO PROFISSIONAL PARA DATAS (FIM DO LOOK NAVEGADOR) */
        input[type="date"]::-webkit-calendar-picker-indicator {
            cursor: pointer;
            filter: invert(0.5);
            opacity: 0.6;
        }

        input[type="date"]::-webkit-calendar-picker-indicator:hover {
            opacity: 1;
        }

        /* Garantir que containers não-editáveis não recebam foco */
        [tabindex="-1"]:focus {
            outline: none !important;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@400&display=swap" rel="stylesheet" />
</head>

<body class="bg-[#f8fafc] font-sans text-slate-700 h-screen flex flex-col overflow-hidden relative">

    <div class="flex flex-1 overflow-hidden bg-white w-full">
        <!-- SIDEBAR -->
        <aside class="sig-sidebar">
            <div class="sig-sidebar-header">
                <span>PARAMETROS <span class="text-[8px] text-[#00e5ff] font-black">V2</span></span>
            </div>
            <nav class="sig-sidebar-menu flex-1 bg-white">
                <div id="btn-empresa" onclick="mostrarAba('empresa')" class="sig-menu-item ativa">
                    <span>Empresas</span>
                    <span class="sig-shortcut">F2</span>
                </div>
                <div id="btn-marcas" onclick="mostrarAba('marcas')" class="sig-menu-item">
                    <span>Marcas</span>
                    <span class="sig-shortcut">F3</span>
                </div>
                <div id="btn-categorias" onclick="mostrarAba('categorias')" class="sig-menu-item">
                    <span>Categorias</span>
                    <span class="sig-shortcut">F4</span>
                </div>

                <div id="btn-usuarios" onclick="mostrarAba('usuarios')" class="sig-menu-item">
                    <span>Usuários</span>
                    <span class="sig-shortcut">F5</span>
                </div>
                <div id="btn-funcoes" onclick="mostrarAba('funcoes')" class="sig-menu-item">
                    <span>Funções</span>
                    <span class="sig-shortcut">F6</span>
                </div>
                <div id="btn-fornecedores" onclick="mostrarAba('fornecedores')" class="sig-menu-item">
                    <span>Fornecedores</span>
                    <span class="sig-shortcut">F7</span>
                </div>
            </nav>
        </aside>

        <!-- AREA PRINCIPAL -->
        <main class="flex-1 flex flex-col overflow-hidden px-6 py-3 bg-white w-full">
            <div id="aba-empresa" class="sig-secao ativa flex flex-col h-full w-full overflow-hidden">
                <!-- CONTEÚDO INJETADO VIA FETCH DE "./tabela/empresa_tabela.html" -->
            </div>

            <!-- SEÇÃO DE MARCAS -->
            <div id="aba-marcas" class="sig-secao hidden w-full flex flex-col h-full overflow-hidden">
                <!-- CONTEÚDO INJETADO VIA FETCH -->
            </div>

            <!-- SEÇÃO DE CATEGORIAS -->
            <div id="aba-categorias" class="sig-secao hidden w-full flex flex-col h-full overflow-hidden">
                <!-- CONTEÚDO INJETADO VIA FETCH -->
            </div>



            <div id="aba-usuarios" class="sig-secao hidden flex flex-col h-full overflow-hidden">
                <!-- CONTEÚDO INJETADO VIA FETCH DE "./tabelas/usuarios_tabela.html" -->
            </div>

            <div id="aba-funcoes" class="sig-secao hidden flex flex-col h-full overflow-hidden">
                <!-- CONTEÚDO INJETADO VIA FETCH DE "./tabelas/funcoes_tabela.html" -->
            </div>

            <div id="aba-fornecedores" class="sig-secao hidden flex flex-col h-full overflow-hidden">
                <!-- CONTEÚDO INJETADO VIA FETCH DE "./tabelas/fornecedores_tabela.html" -->
            </div>
        </main>
    </div>

    <!-- STATUS BAR / RODAPÉ PADRÃO SIG (Web Component) -->
    <sig-statusbar terminal="PARÂMETROS" atalhos="F2 EMPRESAS | F3 MARCAS | F4 CATEGORIAS | F5 USUÁRIOS | F7 FORNECEDORES"></sig-statusbar>

    <!-- CONTAINER DE MODAIS -->
    <div id="modal-container-fornecedores"></div>

    <!-- LÓGICA E MODAIS DINÂMICOS -->
    <script src="./parametros.js"></script>
</body>
</html>
