<!-- MODAL SUBCATEGORIA: DESIGN BLUEPRINT OFICIAL -->
<div id="modal-subcategoria" class="sig-modal-overlay hidden">
    <div class="bg-white w-full max-w-[500px] rounded-md shadow-2xl overflow-hidden border border-slate-400">
        
        <!-- HEADER DO MODAL -->
        <div class="bg-slate-50 p-2 px-4 flex justify-between items-center border-b border-slate-300">
            <div class="flex items-center gap-2">
                <span class="material-symbols-outlined text-slate-500 text-sm">layers</span>
                <h3 class="text-slate-700 font-bold text-[11px] uppercase tracking-wider">Vincular Subcategoria ao Catálogo</h3>
            </div>
            <button onclick="fecharModalSubcategoria()" class="sig-btn-close !w-7 !h-7">
                <span class="material-symbols-outlined !text-base">close</span>
            </button>
        </div>

        <!-- CONTEÚDO DO MODAL -->
        <div class="p-6">
            <form id="form-subcategoria" class="space-y-4">
                <!-- ESTRUTURA HIERÁRQUICA -->
                <div class="sig-fieldset-blueprint w-full">
                    <span class="sig-legend-blueprint w-auto font-black px-2">ESTRUTURA HIERÁRQUICA</span>
                    <div class="space-y-3 p-3">
                        <input type="hidden" id="sub-id">
                        
                        <div>
                            <label class="sig-label-dense">CATEGORIA MASTER (PAI) *</label>
                            <select id="sub-categoria-id" class="sig-input-dense w-full uppercase font-black text-sig-blue">
                                <option value="">SELECIONE A CATEGORIA...</option>
                                <!-- Injetado via JS -->
                            </select>
                        </div>
                        
                        <div>
                            <label class="sig-label-dense">NOME DA SUBCATEGORIA *</label>
                            <input type="text" id="sub-nome" class="sig-input-dense w-full uppercase font-bold" placeholder="EX: MONITORES GAMER">
                        </div>
                    </div>
                </div>
            </form>
        </div>

        <!-- FOOTER DO MODAL -->
        <div class="p-3 bg-slate-50 border-t border-slate-200 flex justify-end gap-2 px-6">
            <button onclick="fecharModalSubcategoria()" class="sig-btn text-slate-500 hover:bg-slate-200 uppercase text-[10px] font-bold px-6 py-2">Cancelar</button>
            <button onclick="salvarBdSubcategoria()" class="sig-btn sig-btn-primary min-w-[200px] shadow-lg flex items-center justify-center gap-2">
                <span class="material-symbols-outlined !text-[18px]">save</span>
                <span class="tracking-widest font-black uppercase text-[10px]">Gravar Vínculo (F5)</span>
            </button>
        </div>
    </div>
</div>
