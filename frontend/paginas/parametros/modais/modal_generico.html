<!-- MODAL GENÉRICO: DESIGN BLUEPRINT OFICIAL -->
<div id="modal-generico" class="sig-modal-overlay hidden">
    <div class="bg-white w-full max-w-[450px] rounded-md shadow-2xl overflow-hidden border border-slate-400">
        
        <!-- HEADER DO MODAL -->
        <div class="bg-slate-50 p-2 px-4 flex justify-between items-center border-b border-slate-300">
            <div class="flex items-center gap-2">
                <span class="material-symbols-outlined text-slate-500 text-sm">settings_suggest</span>
                <h3 id="titulo-modal-generico" class="text-slate-700 font-bold text-[11px] uppercase tracking-wider">Cadastro Auxiliar de Sistema</h3>
            </div>
            <button onclick="fecharModalGenerico()" class="sig-btn-close !w-7 !h-7">
                <span class="material-symbols-outlined !text-base">close</span>
            </button>
        </div>

        <!-- CONTEÚDO DO MODAL -->
        <div class="p-8">
            <form id="form-generico" class="space-y-6">
                <!-- DADOS DO REGISTRO -->
                <div class="sig-fieldset-blueprint w-full">
                    <span class="sig-legend-blueprint w-auto font-black px-2">INFORMAÇÕES DO REGISTRO</span>
                    <div class="space-y-4 p-2">
                        <input type="hidden" id="gen-id">
                        <input type="hidden" id="gen-tipo">
                        
                        <div>
                            <label class="sig-label-dense">NOME / DESCRITIVO OFICIAL *</label>
                            <input type="text" id="gen-nome" class="sig-input-dense w-full uppercase font-bold text-sig-blue" placeholder="DIGITE A DESCRIÇÃO...">
                        </div>
                        
                        <div id="gen-box-margem" class="hidden">
                            <label class="sig-label-dense text-sig-blue">MARGEM PADRÃO (%) / MARKUP BASE</label>
                            <input type="number" id="gen-margem" class="sig-input-dense w-full font-black text-sig-blue bg-slate-50 border-slate-200" step="0.01" placeholder="0.00">
                        </div>
                    </div>
                </div>
            </form>
        </div>

        <!-- FOOTER DO MODAL -->
        <div class="p-3 bg-slate-50 border-t border-slate-200 flex justify-end gap-2 px-6">
            <button onclick="fecharModalGenerico()" class="sig-btn text-slate-500 hover:bg-slate-200 uppercase text-[10px] font-bold px-6 py-2">Cancelar</button>
            <button id="btn-salvar-gen" class="sig-btn sig-btn-primary min-w-[180px] shadow-lg flex items-center justify-center gap-2">
                <span class="material-symbols-outlined !text-[18px]">save</span>
                <span class="tracking-widest font-black uppercase text-[10px]">Gravar Dados (F5)</span>
            </button>
        </div>
    </div>
</div>
