<!-- MODAL FUNÇÃO / CARGO: DESIGN BLUEPRINT OFICIAL -->
<div id="modal-funcao" class="sig-modal-overlay hidden">
    <div class="bg-white w-full max-w-[480px] rounded-md shadow-2xl overflow-hidden border border-slate-400">
        
        <!-- HEADER DO MODAL -->
        <div class="bg-slate-50 p-2 px-4 flex justify-between items-center border-b border-slate-300">
            <div class="flex items-center gap-2">
                <span class="material-symbols-outlined text-slate-500 text-sm">engineering</span>
                <h3 class="text-slate-700 font-bold text-[11px] uppercase tracking-wider">Cargos e Funções Operacionais</h3>
            </div>
            <button onclick="fecharModalFuncao()" class="sig-btn-close !w-7 !h-7">
                <span class="material-symbols-outlined !text-base">close</span>
            </button>
        </div>

        <!-- CONTEÚDO DO MODAL -->
        <div class="p-8">
            <form id="form-funcao" class="space-y-6">
                <!-- DADOS DA ATRIBUIÇÃO -->
                <div class="sig-fieldset-blueprint w-full">
                    <span class="sig-legend-blueprint w-auto font-black px-2">DADOS DA ATRIBUIÇÃO</span>
                    <div class="p-2">
                        <input type="hidden" id="fun-id">
                        <div>
                            <label class="sig-label-dense">NOME DO CARGO / DESCRIÇÃO DA FUNÇÃO *</label>
                            <input type="text" id="fun-nome" class="sig-input-dense w-full uppercase font-black text-sig-blue" placeholder="EX: VENDEDOR EXTERNO">
                        </div>
                    </div>
                </div>
            </form>
        </div>

        <!-- FOOTER DO MODAL -->
        <div class="p-3 bg-slate-50 border-t border-slate-200 flex justify-end gap-2 px-6">
            <button onclick="fecharModalFuncao()" class="sig-btn text-slate-500 hover:bg-slate-200 uppercase text-[10px] font-bold px-6 py-2">Cancelar</button>
            <button onclick="salvarBdFuncao()" class="sig-btn sig-btn-primary min-w-[180px] shadow-lg flex items-center justify-center gap-2">
                <span class="material-symbols-outlined !text-[18px]">save</span>
                <span class="tracking-widest font-black uppercase text-[10px]">Gravar Função</span>
            </button>
        </div>
    </div>
</div>
