<!-- MODAL CADASTRO COMPLETO EMPRESA (MATRIZ / FILIAL) -->
<div id="modal-empresa-wrapper" class="sig-modal-overlay hidden bg-black/60 backdrop-blur-none fixed inset-0 z-50 flex items-center justify-center p-4">
    <div id="modal-empresa-window" class="bg-white w-full max-w-[400px] transition-all duration-300 ease-in-out rounded-md shadow-2xl overflow-hidden border border-slate-400 flex flex-col max-h-[90vh]">
        <!-- CABEÇALHO -->
        <div class="bg-slate-50 p-2 px-4 flex justify-between items-center border-b border-slate-300 shrink-0">
            <div class="flex items-center gap-2">
                <span class="material-symbols-outlined text-slate-500 text-sm">domain</span>
                <h3 class="text-slate-700 font-bold text-[11px] uppercase tracking-wider">CADASTRO COMPLETO DE EMPRESA</h3>
            </div>
            <button onclick="document.getElementById('modal-empresa-wrapper').remove()" class="sig-btn-close !w-7 !h-7">
                <span class="material-symbols-outlined !text-base">close</span>
            </button>
        </div>

        <!-- PASSO 1: ESCOLHA DE HIERARQUIA -->
        <input type="hidden" id="emp-id-hidden" value="0">
        <div id="passo-1-hierarquia" class="flex flex-col p-6 w-full bg-white">
            <h4 class="text-[11px] font-black text-slate-700 mb-5 tracking-widest text-center uppercase border-b border-slate-100 pb-2">Passo 1: Hierarquia Operacional</h4>
            
            <label class="sig-label-dense mb-[-6px]">CLASSIFICAÇÃO DA UNIDADE *</label>
            <div class="flex bg-slate-200/60 p-0.5 rounded-sm border border-slate-300 h-8 mt-1 mb-4">
                <input type="hidden" id="emp-ismatriz" value="true">
                <button type="button" id="btn-tipo-matriz" onclick="window.setTipoEmpresa(true)" class="flex-1 flex items-center justify-center text-[10px] font-bold uppercase rounded-sm cursor-pointer transition-all bg-white text-blue-800 shadow-[0_1px_2px_rgba(0,0,0,0.1)]">MATRIZ</button>
                <button type="button" id="btn-tipo-filial" onclick="window.setTipoEmpresa(false)" class="flex-1 flex items-center justify-center text-[10px] font-bold uppercase rounded-sm cursor-pointer transition-all text-slate-500 bg-transparent">FILIAL</button>
            </div>
            
            <!-- DESTRINCHAR SE FOR FILIAL -->
            <div id="box-filial-destrinchar" class="hidden flex-col gap-3 mt-2 pt-3 border-t border-slate-200 mb-4">
                <div>
                    <label class="sig-label-dense mb-1">MATRIZ VINCULADA *</label>
                    <select id="emp-matriz-id" class="sig-input-dense w-full font-bold text-sig-blue tracking-widest bg-blue-50">
                        <!-- Preenchido dinamicamente via JS -->
                    </select>
                </div>
                <div class="mt-2 text-center bg-slate-50 p-2 border border-slate-200 rounded flex justify-center">
                    <label class="sig-check-group cursor-pointer !gap-2">
                        <input type="checkbox" id="emp-estoquecomp" class="sig-checkboxScale">
                        <span class="sig-check-label text-[10px] font-bold text-emerald-700 uppercase">Compartilha Estoque da Matriz</span>
                    </label>
                </div>
            </div>

            <button type="button" onclick="window.avancarCadastroEmpresa()" class="sig-btn sig-btn-primary w-full shadow-md font-black tracking-widest mt-4 uppercase text-[10px] py-2 flex justify-center items-center gap-1">
                PRÓXIMO <span class="material-symbols-outlined !text-[16px]">arrow_forward</span>
            </button>
        </div>

        <!-- PASSO 2: FORMULÁRIO COMPLETO OMITIDO INICIALMENTE -->
        <div id="passo-2-cadastro" class="hidden flex-col flex-1 overflow-hidden">
            <!-- AREA DE CONTEÚDO -->
            <div class="p-6 overflow-y-auto flex-1 bg-slate-50">
            <div class="grid grid-cols-12 gap-5 h-full">
                <!-- COLUNA ESQUERDA: CLASSIFICAÇÃO / IDENTIFICAÇÃO -->
                <div class="col-span-4 flex flex-col gap-4">
                    
                    <fieldset class="sig-fieldset-blueprint border-slate-300 bg-white shadow-sm">
                        <legend class="text-[9px] font-black tracking-widest text-slate-500 bg-white px-2">IDENTIFICAÇÃO FISCAL</legend>
                        <div class="flex flex-col gap-3 py-3 px-2">
                            <div>
                                <label class="sig-label-dense mb-1">CNPJ *</label>
                                <div class="flex gap-1">
                                    <input type="text" id="emp-cnpj" class="sig-input-dense w-full font-mono font-black tracking-widest text-slate-700" placeholder="00.000.000/0000-00">
                                    <button type="button" class="sig-btn btn-search-blue px-3 !h-[28px] flex items-center shadow-sm" onclick="window.liberarCamposEmpresa()">
                                        <span class="material-symbols-outlined !text-sm">search</span>
                                    </button>
                                </div>
                            </div>
                            
                            <div class="campos-destravaveis-container">
                                <div>
                                    <label class="sig-label-dense mb-1 mt-2">INSCRIÇÃO ESTADUAL</label>
                                    <input type="text" id="emp-ie" class="sig-input-dense w-full font-mono" placeholder="ISENTO OU NÚMERO">
                                </div>
                                <div class="mt-3">
                                    <label class="sig-label-dense mb-1">REGIME TRIBUTÁRIO</label>
                                    <select id="emp-regime" class="sig-input-dense w-full font-bold text-slate-600">
                                        <option value="SIMPLES NACIONAL">SIMPLES NACIONAL</option>
                                        <option value="SIMPLES NACIONAL (EXCESSO)">SIMPLES (EXCESSO REC.)</option>
                                        <option value="LUCRO PRESUMIDO">LUCRO PRESUMIDO</option>
                                        <option value="LUCRO REAL">LUCRO REAL</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </fieldset>
                    <!-- LOGOTIPO / IDENTIDADE VISUAL -->
                    <fieldset class="sig-fieldset-blueprint border-slate-300 bg-white shadow-sm flex-1 mb-2 campos-destravaveis-container">
                        <legend class="text-[9px] font-black tracking-widest text-slate-500 bg-white px-2">LOGOTIPO DA EMPRESA</legend>
                        <div class="p-3">
                            <label class="w-full h-[120px] flex flex-col items-center justify-center px-4 border-2 border-dashed border-slate-300 rounded-sm bg-white hover:bg-blue-50 hover:border-blue-400 hover:text-blue-600 transition-colors cursor-pointer group-upload text-slate-400">
                                <span class="material-symbols-outlined !text-[28px] mb-2 opacity-50 group-hover:opacity-100">image</span>
                                <span class="text-[9px] font-black uppercase tracking-widest text-center">Vincular Logotipo<br><span class="opacity-50 text-[8px] font-medium lowercase">(.png, .jpg)</span></span>
                                <input type="file" id="emp-logo" class="hidden" accept="image/*" />
                            </label>
                        </div>
                    </fieldset>

                </div>

                <!-- COLUNA DIREITA: DADOS CADASTRAIS -->
                <div id="coluna-dados-cadastro" class="col-span-8 flex flex-col gap-4 campos-destravaveis-container">
                    
                    <!-- NOMES E MARCAS -->
                    <fieldset class="sig-fieldset-blueprint border-slate-300 bg-white shadow-sm">
                        <legend class="text-[9px] font-black tracking-widest text-blue-600 bg-white px-2">NOMES E MARCAS</legend>
                        <div class="grid grid-cols-2 gap-3 py-3 px-2">
                            <div class="col-span-2">
                                <label class="sig-label-dense mb-1">RAZÃO SOCIAL *</label>
                                <input type="text" id="emp-razao" class="sig-input-dense w-full font-bold uppercase text-slate-700" placeholder="RAZÃO SOCIAL OFICIAL">
                            </div>
                            <div class="col-span-2">
                                <label class="sig-label-dense mb-1">NOME FANTASIA / NOME COMERCIAL</label>
                                <input type="text" id="emp-fantasia" class="sig-input-dense w-full font-bold uppercase text-blue-800" placeholder="NOME COMERCIAL">
                            </div>
                        </div>
                    </fieldset>

                    <!-- ENDEREÇO COMPLETO -->
                    <fieldset class="sig-fieldset-blueprint border-slate-300 bg-white shadow-sm flex-1">
                        <legend class="text-[9px] font-black tracking-widest text-slate-500 bg-white px-2">LOCALIZAÇÃO E CONTATOS (ESTRUTURA FÍSICA)</legend>
                        <div class="grid grid-cols-12 gap-3 py-3 px-2">
                            <div class="col-span-3">
                                <label class="sig-label-dense mb-1">CEP</label>
                                <input type="text" id="emp-cep" class="sig-input-dense w-full font-mono text-center" placeholder="00000-000">
                            </div>
                            <div class="col-span-7">
                                <label class="sig-label-dense mb-1">ENDEREÇO (LOGRADOURO)</label>
                                <input type="text" id="emp-logradouro" class="sig-input-dense w-full uppercase" placeholder="RUA, AVENIDA, ETC">
                            </div>
                            <div class="col-span-2">
                                <label class="sig-label-dense mb-1">NÚMERO</label>
                                <input type="text" id="emp-numero" class="sig-input-dense w-full text-center" placeholder="S/N">
                            </div>
                            <div class="col-span-4">
                                <label class="sig-label-dense mb-1">BAIRRO</label>
                                <input type="text" id="emp-bairro" class="sig-input-dense w-full uppercase" placeholder="NOME DO BAIRRO">
                            </div>
                            <div class="col-span-6">
                                <label class="sig-label-dense mb-1">CIDADE</label>
                                <input type="text" id="emp-cidade" class="sig-input-dense w-full uppercase" placeholder="NOME DA CIDADE">
                            </div>
                            <div class="col-span-2">
                                <label class="sig-label-dense mb-1">UF</label>
                                <input type="text" id="emp-uf" class="sig-input-dense w-full text-center uppercase" placeholder="UF" maxlength="2">
                            </div>
                            <div class="col-span-6">
                                <label class="sig-label-dense mb-1">COMPLEMENTO</label>
                                <input type="text" id="emp-complemento" class="sig-input-dense w-full uppercase" placeholder="SALA, ANDAR, GALPÃO...">
                            </div>
                        </div>
                    </fieldset>

                    <!-- CONTATOS (GRID DINÂMICO Igual Fornecedor e Blueprint HTML) -->
                    <fieldset class="sig-fieldset-blueprint border-slate-300 bg-white shadow-sm flex-1 mb-2">
                        <legend class="text-[9px] font-black tracking-widest text-emerald-600 bg-white px-2">CANAIS DE ATENDIMENTO</legend>
                        <div class="flex flex-col gap-2 px-2 py-3">
                            <div class="grid grid-cols-12 gap-2 bg-slate-50 p-2 border border-slate-200 rounded-sm shrink-0">
                                <div class="col-span-4">
                                    <label class="sig-label-dense mb-0.5">NOME DO CONTATO</label>
                                    <input type="text" id="emp-contato-nome" class="sig-input-dense w-full uppercase" placeholder="EX: JOÃO / GERENTE">
                                </div>
                                <div class="col-span-4">
                                    <label class="sig-label-dense mb-0.5">TELEFONE / CELULAR</label>
                                    <input type="text" id="emp-contato-tel" class="sig-input-dense w-full" placeholder="(00) 00000-0000" oninput="formatarTelefone(this)">
                                </div>
                                <div class="col-span-3">
                                    <label class="sig-label-dense mb-0.5">DEPARTAMENTO</label>
                                    <input type="text" id="emp-contato-dept" class="sig-input-dense w-full uppercase" placeholder="EX: FINANCEIRO">
                                </div>
                                <div class="col-span-1 flex items-end justify-center pl-2">
                                    <button type="button" onclick="window.adicionarContatoEmpresa()" class="sig-btn sig-btn-success !w-[28px] !h-[28px] p-0 flex items-center justify-center rounded-sm mx-auto shadow-sm">
                                        <span class="material-symbols-outlined !text-sm">add</span>
                                    </button>
                                </div>
                            </div>
                            <div class="flex-1 overflow-y-auto min-h-[100px] border border-slate-200 rounded-sm mt-1 bg-white">
                                <table class="sig-table text-[10px] w-full">
                                    <thead class="sticky top-0 z-10 bg-slate-100 shadow-sm border-b border-slate-200">
                                        <tr>
                                            <th class="py-1 px-2 text-left">NOME</th>
                                            <th class="w-32 py-1 px-2 text-center border-l border-slate-200">TELEFONE</th>
                                            <th class="w-24 py-1 px-2 text-center border-l border-slate-200">DEPARTAMENTO</th>
                                            <th class="w-10 py-1 text-center border-l border-slate-200">...</th>
                                        </tr>
                                    </thead>
                                    <tbody id="lista-contatos-empresa">
                                        <!-- Renderizado via JS -->
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </fieldset>

                </div>
            </div>
        </div>

            <!-- RODAPÉ AÇÕES -->
            <div class="bg-slate-100 border-t border-slate-300 p-3 px-4 flex justify-between shrink-0">
                <button type="button" onclick="window.voltarCadastroEmpresa()" class="sig-btn btn-cancelar font-black uppercase text-[10px] tracking-widest px-6 shadow-sm flex items-center gap-1">
                    <span class="material-symbols-outlined !text-[16px] relative top-[1px]">arrow_back</span> VOLTAR
                </button>
                <button type="button" onclick="window.salvarEmpresaCompleta()" id="btn-submit-empresa" class="sig-btn sig-btn-primary font-black uppercase text-[10px] tracking-widest px-8 shadow-sm flex items-center gap-2">
                    <span class="material-symbols-outlined text-[16px]">save</span> <span id="label-submit-empresa">GRAVAR EMPRESA</span>
                </button>
            </div>
        </div>
    </div>
</div>
