<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>SIG - NOVO CADASTRO DE PRODUTO</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'sig-blue': '#1e40af',
                        'sig-blue-dark': '#001b2b',
                        'sig-brand-cyan': '#00e5ff',
                        'sig-border': '#cbd5e1',
                        'sig-bg-light': '#f8fafc'
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="../../assets/css/sig-ui.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@300..700,0..1&display=swap"
        rel="stylesheet" />
</head>

<body class="bg-slate-200 h-screen flex flex-col overflow-hidden">

    <!-- CABEÇALHO ESTILO WINDOWS (Nativo Wails já tem barra, mas mantemos o branding) -->
    <header class="bg-sig-blue-dark p-2 px-4 flex justify-between items-center shrink-0">
        <div class="flex items-center gap-2">
            <span class="material-symbols-outlined text-sig-brand-cyan text-base">edit_note</span>
            <h1 class="text-white font-bold text-[11px] uppercase tracking-wider">Cadastro Master de Produto</h1>
        </div>
        <div class="text-white/40 text-[9px] font-bold uppercase tracking-widest">
            F3 - Interface de Engenharia
        </div>
    </header>

    <main class="flex-1 overflow-hidden flex flex-col bg-white">
        <!-- ÁREA PARA CARREGAMENTO DINÂMICO DO FRAGMENTO -->
        <div id="form-content-area" class="flex-1 overflow-hidden flex flex-col">
            <!-- Loader inicial -->
            <div class="flex-1 flex items-center justify-center">
                <div class="sig-spinner"></div>
                <span class="ml-3 text-slate-500 font-bold uppercase text-[10px]">Carregando Engenharia de Produto...</span>
            </div>
        </div>

        <!-- RODAPÉ FIXO -->
        <footer class="h-[50px] bg-[#e2e8f0] border-t border-[#cbd5e1] flex items-center justify-end px-4 gap-3">
            <button onclick="ConfirmarSair()" class="sig-btn text-slate-600 hover:bg-white px-6 h-9 font-bold">CANCELAR
                (ESC)</button>
            <button onclick="GravarProduto()"
                class="sig-btn sig-btn-success px-10 h-9 shadow-lg font-black tracking-widest">
                <span class="material-symbols-outlined">save</span> GRAVAR REGISTRO (F5)
            </button>
        </footer>
    </main>

    <script>
        async function carregarFormulario() {
            try {
                const res = await fetch('../../componentes/cadastro_form_fragmento.html');
                const html = await res.text();
                document.getElementById('form-content-area').innerHTML = html;
                
                // O fragmento já contém a lógica de inicialização de splitters etc se importado.
                // Aqui podemos injetar dados se for modo EDIÇÃO no futuro.
                
                console.log("✅ Fragmento de cadastro carregado com sucesso.");
            } catch (e) {
                console.error(e);
                document.getElementById('form-content-area').innerHTML = `<div class="p-10 text-center text-red-600 font-bold uppercase">Erro ao carregar fragmento de cadastro.</div>`;
            }
        }
    </script>

    <!-- MODAL NOVA APLICAÇÃO (VERTICAL STAGING) -->
    <div id="modal-nova-aplicacao"
        class="fixed inset-0 z-[200] bg-black/60 hidden items-center justify-center backdrop-blur-[1px]">
        <div class="bg-white w-[500px] max-h-[90vh] rounded-sm shadow-2xl flex flex-col border border-slate-400">
            <div class="bg-sig-blue-dark p-2 px-4 flex justify-between items-center shrink-0">
                <div class="flex items-center gap-2">
                    <span class="material-symbols-outlined text-sig-brand-cyan text-base">directions_car</span>
                    <h3 class="text-white font-bold text-[11px] uppercase tracking-wider">Inclusão Múltipla de
                        Aplicações</h3>
                </div>
                <button onclick="fecharModalAplicacao()"
                    class="hover:bg-red-600 transition-colors px-2 h-full text-white">
                    <span class="material-symbols-outlined text-base">close</span>
                </button>
            </div>
            <div class="p-4 bg-slate-50 border-b border-slate-200">
                <div class="grid grid-cols-12 gap-3">
                    <div class="col-span-4">
                        <label class="sig-label">Marca</label>
                        <select id="app-marca" class="sig-input w-full">
                            <option>VW</option>
                            <option>FIAT</option>
                            <option>CHEVROLET</option>
                            <option>FORD</option>
                            <option>TOYOTA</option>
                            <option>HONDA</option>
                        </select>
                    </div>
                    <div class="col-span-8">
                        <label class="sig-label">Modelo</label>
                        <input type="text" id="app-modelo" class="sig-input w-full uppercase" placeholder="EX: GOL G5">
                    </div>
                    <div class="col-span-6">
                        <label class="sig-label">Vrs / Motor</label>
                        <input type="text" id="app-motor" class="sig-input w-full uppercase" placeholder="EX: 1.0 8V">
                    </div>
                    <div class="col-span-3">
                        <label class="sig-label">Início</label>
                        <input type="text" id="app-ano-inicio" class="sig-input w-full text-center" placeholder="2000">
                    </div>
                    <div class="col-span-3">
                        <label class="sig-label">Fim</label>
                        <input type="text" id="app-ano-fim" class="sig-input w-full text-center" placeholder="2024">
                    </div>
                </div>
                <button onclick="adicionarParaPrevia()" class="w-full mt-4 sig-btn sig-btn-primary h-10 shadow-md">
                    ADICIONAR À LISTA [ENTER]
                </button>
            </div>
            <div class="flex-1 overflow-y-auto bg-white p-2 min-h-[150px]">
                <table class="sig-table sig-table-sm w-full">
                    <tbody id="previa-novas-aplicacoes"></tbody>
                </table>
            </div>
            <div class="bg-slate-100 p-3 border-t border-slate-300 flex justify-between items-center">
                <span id="contador-previa" class="text-[9px] font-bold text-slate-500 uppercase">0 ITENS</span>
                <button onclick="confirmarTudoAplicacao()" class="sig-btn sig-btn-success px-6 h-8">CONFIRMAR TUDO
                    [F5]</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', carregarFormulario);

        const moneyToFloat = (v) => {
            if(!v) return 0;
            return parseFloat(v.toString().replace(/\./g, '').replace(',', '.')) || 0;
        };

        function GravarProduto() {
            // IDs sincronizados com cadastro_form_fragmento.html
            const payload = {
                sku: document.getElementById('prod-sku').value.trim().toUpperCase(),
                descricao_tecnica: document.getElementById('prod-descricao').value.trim().toUpperCase(),
                custo: moneyToFloat(document.getElementById('prod-custo').value),
                venda: moneyToFloat(document.getElementById('prod-venda').value),
                marca_id: parseInt(document.getElementById('prod-marca-id').value) || 0,
                categoria_id: parseInt(document.getElementById('prod-categoria-id').value) || 0,
                subcategoria_id: parseInt(document.getElementById('prod-subcategoria-id').value) || 0,
                ncm: document.getElementById('prod-ncm').value,
                peso: parseFloat(document.getElementById('prod-peso').value) || 0
            };

            if (!payload.sku || !payload.descricao_tecnica) {
                return alert("⚠️ O Código SKU e a Descrição são obrigatórios!");
            }
            
            // Integração com Go (Wails)
            const goApp = window.go && window.go.main && window.go.main.App;
            if (goApp) {
                goApp.SalvarProduto(payload).then(res => {
                    if (res.startsWith("OK")) {
                        alert("✅ Produto gravado com sucesso!");
                        if (window.runtime) window.runtime.Quit();
                    } else {
                        alert(res);
                    }
                }).catch(e => alert("🔥 Erro na comunicação: " + e));
            } else {
                alert("⚠️ Erro: Subsistema de dados não disponível.");
            }
        }

        function ConfirmarSair() {
            if (confirm("Deseja sair sem salvar as alterações?")) {
                if (window.runtime && window.runtime.Quit) window.runtime.Quit();
            }
        }

        window.onkeydown = (e) => {
            if (e.key === 'Escape') ConfirmarSair();
            if (e.key === 'F5') { e.preventDefault(); GravarProduto(); }
        };
    </script>
</body>

</html>
