<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>SISTEMA CORE - NAVEGADOR</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #f8f9fa;
        }

        #app-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        #main-frame {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
    <!-- LINK PARA O DESIGN SYSTEM PADRONIZADO -->
    <link rel="stylesheet" href="./assets/css/sig-ui.css">
    <!-- ÍCONES -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@400&display=swap"
        rel="stylesheet" />
</head>

<body>
    <div id="app-container">
        <!-- Iframe inicia vazio para segurança -->
        <iframe id="main-frame"></iframe>
    </div>

    <script>
        window.addEventListener('message', function(e) {
            if (e.data.type === 'LOGIN_SUCCESS') {
                document.getElementById('main-frame').src = './paginas/hub/hub.html?v=' + Date.now();
            }
        });

        // Roteamento Multi-Window Nativo do Wails
        window.onload = async () => {
            // Aguarda a integração com Go e checa qual módulo ele deve abrir
            const moduloInicial = await window.go.main.App.GetModuloInicial();
            const frame = document.getElementById("main-frame");

            if (moduloInicial && moduloInicial.trim() !== "") {
                // Essa instância virou janela de módulo específico
                frame.src = './paginas/' + moduloInicial + '/' + moduloInicial + '.html?v=' + Date.now();
            } else {
                // Instância Principal: Abre a tela de Login Oficial
                frame.src = './paginas/login/login.html?v=' + Date.now();
            }
        };

    </script>
</body>

</html>
