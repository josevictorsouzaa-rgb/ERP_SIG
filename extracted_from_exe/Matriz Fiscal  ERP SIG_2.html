<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matriz Fiscal - ERP SIG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/sig-uikit.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
</head>
<body class="bg-[#F8FAFC] overflow-hidden flex h-screen font-sans">

    <!-- SIDEBAR PADRÃO SIG (DENSE) -->
    <aside class="w-[64px] bg-[#1E293B] flex flex-col items-center py-4 gap-4 border-r border-slate-700 shadow-xl z-50">
        <div class="w-10 h-10 bg-indigo-600 rounded-lg flex items-center justify-center mb-4 shadow-lg shadow-indigo-500/20">
            <span class="text-white font-black text-xl">Σ</span>
        </div>
        <button onclick="location.href='../hub/hub.html'" class="w-10 h-10 rounded-lg hover:bg-slate-700 flex items-center justify-center text-slate-400 transition-all font-bold" title="Hub Principal">
            <span class="material-symbols-outlined !text-lg">dashboard</span>
        </button>
        <button onclick="location.href='fiscal.html'" class="w-10 h-10 rounded-lg hover:bg-slate-700 flex items-center justify-center text-slate-400 transition-all font-bold" title="Perfis Fiscais">PF</button>
        <button class="w-10 h-10 rounded-lg bg-indigo-600 flex items-center justify-center text-white transition-all shadow-md shadow-indigo-500/30 font-bold" title="Matriz Fiscal">MF</button>
    </aside>

    <main class="flex-1 flex flex-col min-w-0">
        <!-- HEADER MASTER BLUEPRINT V3 -->
        <header class="h-[50px] bg-white border-b border-slate-200 flex items-center justify-between px-6 shadow-sm z-30">
            <div class="flex items-center gap-3">
                <div class="p-1.5 bg-indigo-50 rounded">
                    <span class="material-symbols-outlined !text-base text-indigo-600">account_tree</span>
                </div>
                <h1 class="text-[11px] font-black text-slate-700 uppercase tracking-widest italic">Matriz de Determinação Fiscal</h1>
            </div>

            <div class="flex items-center gap-2">
                <div class="relative group">
                    <input type="text" id="filtro-matriz" placeholder="Filtrar por nome, cfop, cst ou ncm..." 
                           class="sig-input-dense w-64 pl-8 placeholder:italic bg-slate-50 border-slate-200">
                    <span class="material-symbols-outlined !text-[14px] text-slate-400 absolute left-3 top-2">search</span>
                </div>
                <button onclick="novaRegra()" class="bg-indigo-600 text-white h-[28px] px-4 rounded text-[10px] font-bold uppercase tracking-widest hover:bg-indigo-700 transition-all flex items-center gap-2 shadow-lg shadow-indigo-500/10 active:scale-95">
                    <span class="material-symbols-outlined !text-[14px]">add</span> Nova Regra
                </button>
            </div>
        </header>

        <!-- GRID ULTRA-COMPACTO (Screenshot Pattern) -->
        <div class="flex-1 p-6 overflow-hidden bg-slate-50">
            <div class="bg-white rounded-md border border-slate-200 shadow-sm overflow-hidden flex flex-col h-full ring-1 ring-slate-100">
                <div class="overflow-x-auto flex-1 custom-scrollbar">
                    <table class="w-full text-left border-collapse min-w-[1200px]">
                        <thead>
                            <tr class="bg-slate-50/80 border-b border-slate-200 sticky top-0 z-10 backdrop-blur-sm">
                                <th class="p-3 text-[10px] font-black text-slate-400 uppercase w-12 text-center">ID</th>
                                <th class="p-3 text-[10px] font-black text-slate-400 uppercase">Nome da Regra</th>
                                <th class="p-3 text-[10px] font-black text-slate-400 uppercase text-center">Operação</th>
                                <th class="p-3 text-[10px] font-black text-slate-400 uppercase text-center">Tipo Destino</th>
                                <th class="p-3 text-[10px] font-black text-slate-400 uppercase text-center">Regime</th>
                                <th class="p-3 text-[10px] font-black text-slate-400 uppercase text-center">Prioridade</th>
                                <th class="p-3 text-[10px] font-black text-slate-400 uppercase text-center w-20">Status</th>
                                <th class="p-3 text-[10px] font-black text-slate-400 uppercase w-24 text-center">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="grid-matriz-corpo" class="bg-white divide-y divide-slate-50">
                            <!-- Injetado via JS -->
                        </tbody>
                    </table>
                </div>
                
                <!-- FOOTER INFO -->
                <div class="p-2 bg-white border-t border-slate-100 flex justify-between items-center px-6">
                    <span id="label-count" class="text-[9px] font-bold text-slate-300 uppercase tracking-widest">Total: 0 regras carregadas</span>
                    <div class="flex items-center gap-4 grayscale opacity-30">
                        <span class="text-[8px] font-black text-slate-400 tracking-tighter">SIG ERP BLUEPRINT V3</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- CONTAINER MODAIS -->
    <div id="modal-container"></div>

    <script src="../../wailsjs/go/main/App.js"></script>
    <script src="../../wailsjs/runtime/runtime.js"></script>
    <script src="matriz.js"></script>
</body>
</html>
