<html lang="pt-br">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>SISTEMA CORE - LOGIN</title>
    <!-- Tailwind CSS v3 -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="stylesheet" href="../../assets/css/sig-ui.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <style>
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: transparent;
            overflow: hidden;
            font-family: 'Plus Jakarta Sans', 'Segoe UI', sans-serif;
            animation: fadeIn 0.25s ease-in-out forwards;
        }

        /* Arrastar Janela */
        .drag-region {
            --wails-drop-target: drop;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            z-index: 50;
        }

        .login-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            background: white;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.4);
            position: relative;
            border-radius: 24px;
            overflow: hidden;
        }

        /* Lado Esquerdo - Importado Modularmente via iframe para dar poder de costumização ao usuário final */

        /* Lado Direito - Card Branco Limpo */
        .login-main {
            flex: 1;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            position: relative;
        }

        .login-card-inner {
            width: 100%;
            max-width: 340px;
        }

        .btn-close-organic {
            position: absolute;
            top: 30px;
            right: 30px;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f8fafc;
            color: #94a3b8;
            border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
            cursor: pointer;
            transition: all 0.3s;
            z-index: 100;
            border: none;
        }

        .btn-close-organic:hover {
            background: #fee2e2;
            color: #ef4444;
            transform: rotate(90deg) scale(1.1);
        }

        .login-card-inner h2 {
            font-size: 36px;
            font-weight: 900;
            color: #1e293b;
            margin-bottom: 5px;
            letter-spacing: -1px;
        }

        .login-card-inner .subtext {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 40px;
            font-weight: 500;
        }

        /* Inputs Modernos com Borda Forte (Referência) */
        .form-row {
            margin-bottom: 25px;
        }

        .form-row label {
            display: block;
            font-size: 11px;
            font-weight: 800;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .input-vibrant {
            width: 100%;
            height: 52px;
            padding: 0 16px;
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            color: #0f172a;
            transition: all 0.2s;
            outline: none;
        }

        .input-vibrant:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        /* Ocultar "olho" nativo do Windows em inputs password */
        input[type="password"]::-ms-reveal,
        input[type="password"]::-ms-clear {
            display: none !important;
        }

        /* Servidor Toggle */
        .server-toggle {
            display: flex;
            gap: 15px;
            margin-top: 5px;
        }

        .server-opt {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            font-weight: 700;
            color: #64748b;
            cursor: pointer;
        }

        .server-opt input {
            accent-color: #3b82f6;
            cursor: pointer;
        }

        /* Botão de Sistema */
        .btn-access-sys {
            width: 100%;
            height: 54px;
            background: #0f172a;
            color: white;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 800;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 30px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            box-shadow: 0 4px 6px -1px rgba(15, 23, 42, 0.4);
        }

        .btn-access-sys:hover {
            background: #1e293b;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(15, 23, 42, 0.5);
        }

        .btn-access-sys:active {
            transform: translateY(0);
        }

        .form-footer {
            margin-top: 30px;
            text-align: center;
            font-size: 12px;
            font-weight: 700;
            color: #94a3b8;
        }

        .form-footer a {
            color: #3b82f6;
            text-decoration: none;
            margin: 0 5px;
        }

        .form-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <!-- Drag Region -->
    <div class="drag-region"></div>

    <div class="login-wrapper">
        <!-- Arte Lateral com as Texturas da Nova Referência -->
        <iframe src="./login_design.html"
            style="flex: 1.2; border: none; overflow: hidden; background: transparent;"></iframe>

        <!-- Área de Login -->
        <main class="login-main">
            <!-- Fechar Janela -->
            <button class="btn-close-organic" onclick="fecharJanela()">
                <span class="material-symbols-outlined">close</span>
            </button>

            <div id="login-form-box" class="login-card-inner">
                <h2>Olá,</h2>
                <p class="subtext">Sincronize sua credencial para continuar.</p>

                <div id="login-error-box"
                    style="display: none; background: rgba(239, 68, 68, 0.08); border-radius: 8px; padding: 12px 14px; margin-bottom: 24px; align-items: center; justify-content: flex-start; gap: 8px;">
                    <span class="material-symbols-outlined" style="color: #ef4444; font-size: 18px;">error</span>
                    <span id="login-error-text"
                        style="color: #ef4444; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px;"></span>
                </div>

                <form onsubmit="handleLogin(event)">
                    <div class="form-row">
                        <label>Usuário Corporativo</label>
                        <input type="text" id="username" required class="input-vibrant" placeholder="nome.sobrenome">
                    </div>

                    <div class="form-row">
                        <label>Chave de Acesso</label>
                        <input type="password" id="password" required class="input-vibrant" placeholder="••••••••">
                    </div>

                    <div class="form-row">
                        <label>Ambiente de Trabalho</label>
                        <div class="server-toggle">
                            <label class="server-opt">
                                <input type="radio" name="conn" value="local" checked> Operação Local
                            </label>
                            <label class="server-opt">
                                <input type="radio" name="conn" value="remoto"> Acesso Remoto
                            </label>
                        </div>
                    </div>

                    <button type="submit" class="btn-access-sys">ENTRAR NO SISTEMA</button>

                    <div class="form-footer">
                        <a href="#">Trocar Senha</a>
                        <span>•</span>
                        <a href="#">Suporte Direto</a>
                    </div>
                </form>
            </div>

            <!-- TELA DE REDEFINIÇÃO DE SENHA OBRIGATÓRIA (OCULTA POR PADRÃO) -->
            <div id="reset-form-box" class="login-card-inner" style="display: none;">
                <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 5px;">
                    <div
                        style="width: 40px; height: 40px; border-radius: 50%; background: #eff6ff; color: #3b82f6; display: flex; align-items: center; justify-content: center;">
                        <span class="material-symbols-outlined">lock_reset</span>
                    </div>
                    <h2 style="font-size: 24px; margin:0; font-weight: 900; letter-spacing: -1px; color: #1e293b;">
                        Segurança</h2>
                </div>
                <p class="subtext" style="margin-bottom: 25px; line-height: 1.5; padding-left: 2px;">Este é seu primeiro
                    acesso com a senha padrão. Redefina sua credencial corporativa para continuar.</p>

                <div id="reset-error-box"
                    style="display: none; background: rgba(239, 68, 68, 0.08); border-radius: 8px; padding: 12px 14px; margin-bottom: 24px; align-items: center; justify-content: flex-start; gap: 8px;">
                    <span class="material-symbols-outlined" style="color: #ef4444; font-size: 18px;">error</span>
                    <span id="reset-error-text"
                        style="color: #ef4444; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px;"></span>
                </div>

                <form onsubmit="handleResetSenha(event)">
                    <div class="form-row" style="margin-bottom: 22px;">
                        <label>NOVA CHAVE DE ACESSO</label>
                        <div style="position: relative;">
                            <input type="password" id="new-password" required class="input-vibrant"
                                placeholder="Mínimo 6 dígitos" oninput="validarSenhas()" style="padding-right: 40px;">
                            <button type="button" onclick="togglePassword('new-password', 'eye-icon-1')"
                                style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #94a3b8; display: flex; align-items: center; justify-content: center;">
                                <span id="eye-icon-1" class="material-symbols-outlined"
                                    style="font-size: 20px;">visibility</span>
                            </button>
                        </div>
                        <!-- BARRA DE FORÇA (3 NÍVEIS) -->
                        <div style="display: flex; gap: 4px; margin-top: 8px; height: 4px;">
                            <div id="str-1"
                                style="flex: 1; background: #e2e8f0; border-radius: 2px; transition: background 0.3s;">
                            </div>
                            <div id="str-2"
                                style="flex: 1; background: #e2e8f0; border-radius: 2px; transition: background 0.3s;">
                            </div>
                            <div id="str-3"
                                style="flex: 1; background: #e2e8f0; border-radius: 2px; transition: background 0.3s;">
                            </div>
                        </div>
                        <span id="str-text"
                            style="font-size: 10px; font-weight: 800; color: #94a3b8; display: block; margin-top: 4px; text-transform: uppercase;"></span>
                    </div>

                    <div class="form-row" style="margin-bottom: 24px;">
                        <div
                            style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                            <label style="margin: 0;">CONFIRMAÇÃO</label>
                            <span id="pass-feedback"
                                style="font-size: 10px; font-weight: 800; color: #ef4444; text-transform: uppercase;"></span>
                        </div>
                        <div style="position: relative;">
                            <input type="password" id="new-password-confirm" required class="input-vibrant"
                                placeholder="Repita a senha" oninput="validarSenhas()" style="padding-right: 40px;">
                            <button type="button" onclick="togglePassword('new-password-confirm', 'eye-icon-2')"
                                style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #94a3b8; display: flex; align-items: center; justify-content: center;">
                                <span id="eye-icon-2" class="material-symbols-outlined"
                                    style="font-size: 20px;">visibility</span>
                            </button>
                        </div>
                    </div>

                    <button type="submit" id="btn-reset" class="btn-access-sys"
                        style="background: #94a3b8; box-shadow: none; cursor: not-allowed; transition: all 0.3s;"
                        disabled>ATUALIZAR CREDENCIAL</button>

                    <button type="button" onclick="cancelarReset()"
                        style="width: 100%; margin-top: 15px; background: transparent; border: none; font-size: 13px; font-weight: 700; color: #64748b; cursor: pointer;">Cancelar
                        e Voltar</button>
                </form>
            </div>
        </main>
    </div>

    <script>
        function fecharJanela() {
            if (window.runtime) window.runtime.Quit();
        }

        function mostrarErroReversivel(boxId, textId, msg) {
            const errorBox = document.getElementById(boxId);
            const errorText = document.getElementById(textId);
            errorText.innerText = msg;
            errorBox.style.display = 'flex';
            setTimeout(() => {
                errorBox.style.display = 'none';
            }, 5000);
        }

        async function handleLogin(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="animate-pulse">AUTENTICANDO...</span>';
            btn.disabled = true;

            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();

            try {
                const goEngine = window.parent.go || window.go;
                if (!goEngine) {
                    mostrarErroReversivel('login-error-box', 'login-error-text', 'Acesso Negado: App offline.');
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                    return;
                }

                // Dispara pro BACKEND do GO as credenciais
                const res = await goEngine.main.App.AutenticarLogin(user, pass);
                if (res.status === "ok") {
                    // VERIFICAR PRIMEIRO ACESSO
                    if (res.usuario.precisa_alterar_senha) {
                        window._tempLoggedUser = res.usuario;
                        document.getElementById('login-form-box').style.display = 'none';
                        document.getElementById('reset-form-box').style.display = 'block';
                        btn.innerHTML = originalText;
                        btn.disabled = false;
                        return; // Para o fluxo aqui!
                    }

                    btn.innerHTML = '<span class="text-green-300">ACESSO AUTORIZADO</span>';
                    
                    // Fade out pro Hub (Crossfade)
                    document.body.style.transition = 'opacity 0.25s ease-in-out';
                    document.body.style.opacity = '0';
                    
                    setTimeout(() => {
                        if (window.parent) {
                            window.parent.postMessage({ type: 'LOGIN_SUCCESS', usuario: res.usuario }, '*');
                        }
                    }, 250);
                } else {
                    mostrarErroReversivel('login-error-box', 'login-error-text', res.mensagem);
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }
            } catch (err) {
                mostrarErroReversivel('login-error-box', 'login-error-text', "Falha de Comunicação: " + err);
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        async function handleResetSenha(e) {
            e.preventDefault();
            const pass1 = document.getElementById('new-password').value;
            const pass2 = document.getElementById('new-password-confirm').value;

            if (pass1 !== pass2) {
                mostrarErroReversivel('reset-error-box', 'reset-error-text', "ERRO: As novas credenciais não coincidem!");
                return;
            }
            if (pass1.length < 6) {
                mostrarErroReversivel('reset-error-box', 'reset-error-text', "ERRO: A credencial deve ter no mínimo 6 caracteres!");
                return;
            }

            const btn = e.target.querySelector('button');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="animate-pulse">ATUALIZANDO...</span>';
            btn.disabled = true;

            try {
                const goEngine = window.parent.go || window.go;
                const res = await goEngine.main.App.AlterarSenhaOperadorLogado(pass1);

                if (res === "OK") {
                    btn.innerHTML = '<span style="color: white;">CONCLUÍDO! INICIANDO...</span>';

                    // Como a senha foi atualizada no banco e na memória, podemos prosseguir pro Hub!
                    if (window._tempLoggedUser) {
                        window._tempLoggedUser.precisa_alterar_senha = false;
                    }
                    setTimeout(() => {
                        if (window.parent) {
                            window.parent.postMessage({ type: 'LOGIN_SUCCESS', usuario: window._tempLoggedUser }, '*');
                        }
                    }, 800);
                } else {
                    mostrarErroReversivel('reset-error-box', 'reset-error-text', "Erro ao redefinir a credencial: " + res);
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }
            } catch (err) {
                mostrarErroReversivel('reset-error-box', 'reset-error-text', "Falha Global: " + err);
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.innerText = 'visibility_off';
            } else {
                input.type = 'password';
                icon.innerText = 'visibility';
            }
        }

        function analisarForca(v1) {
            const str1 = document.getElementById('str-1');
            const str2 = document.getElementById('str-2');
            const str3 = document.getElementById('str-3');
            const txt = document.getElementById('str-text');

            if (v1.length === 0) {
                str1.style.background = '#e2e8f0';
                str2.style.background = '#e2e8f0';
                str3.style.background = '#e2e8f0';
                txt.innerText = '';
                return;
            }

            if (v1.length < 6) {
                str1.style.background = '#ef4444'; // Vermelho
                str2.style.background = '#e2e8f0';
                str3.style.background = '#e2e8f0';
                txt.innerText = 'FRACA';
                txt.style.color = '#ef4444';
            } else {
                // Tem 6 ou mais caracteres
                const temLetra = /[a-zA-Z]/.test(v1);
                const temNumero = /[0-9]/.test(v1);
                const temEspecial = /[^a-zA-Z0-9]/.test(v1);

                if ((temLetra && !temNumero && !temEspecial) || (!temLetra && temNumero && !temEspecial)) {
                    // Só letras ou só números
                    str1.style.background = '#f59e0b'; // Amarelo
                    str2.style.background = '#f59e0b';
                    str3.style.background = '#e2e8f0';
                    txt.innerText = 'MÉDIA (ADICIONE NÚMEROS E LETRAS PARA + SEGURANÇA)';
                    txt.style.color = '#f59e0b';
                } else {
                    // Mista = Forte
                    str1.style.background = '#10b981'; // Verde
                    str2.style.background = '#10b981';
                    str3.style.background = '#10b981';
                    txt.innerText = 'FORTE (ÓTIMA SELEÇÃO)';
                    txt.style.color = '#10b981';
                }
            }
        }

        function validarSenhas() {
            const v1 = document.getElementById('new-password').value;
            const v2 = document.getElementById('new-password-confirm').value;
            const btn = document.getElementById('btn-reset');
            const feedback = document.getElementById('pass-feedback');

            analisarForca(v1);

            if (v1.length === 0 && v2.length === 0) {
                feedback.innerText = '';
                desativarBtn(btn);
                return;
            }
            if (v1.length > 0 && v1.length < 6) {
                feedback.innerText = '';
                desativarBtn(btn);
                return;
            }
            if (v2.length > 0 && v1 !== v2) {
                feedback.innerText = 'NÃO CONFERE';
                feedback.style.color = '#ef4444';
                desativarBtn(btn);
                return;
            }
            if (v1 === v2 && v1.length >= 6) {
                feedback.innerText = 'VÁLIDA ✓';
                feedback.style.color = '#10b981';
                ativarBtn(btn);
            }
        }

        function desativarBtn(btn) {
            btn.disabled = true;
            btn.style.background = '#94a3b8';
            btn.style.boxShadow = 'none';
            btn.style.cursor = 'not-allowed';
        }
        function ativarBtn(btn) {
            btn.disabled = false;
            btn.style.background = '#10b981';
            btn.style.boxShadow = '0 10px 20px rgba(16,185,129,0.2)';
            btn.style.cursor = 'pointer';
        }
        function cancelarReset() {
            document.getElementById('reset-form-box').style.display = 'none';
            document.getElementById('login-form-box').style.display = 'block';
            document.getElementById('new-password').value = '';
            document.getElementById('new-password-confirm').value = '';
            validarSenhas();
        }
    </script>
</body>

</html>
